backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - {label: "Update", value: "Update"}
          - {label: "Gaming", value: "Gaming"}
          - {label: "Community", value: "Community"}
          - {label: "Life", value: "Life"}
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
      - label: "Featured Post"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
